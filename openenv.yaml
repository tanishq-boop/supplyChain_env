name: "Supply Chain Resilience"
version: "1.0.0"
tasks:
  - id: "task_1_easy"
    description: "Navigate to the destination with a clear path."
    grader:
      type: deterministic
      endpoint: /grader
    options: {"start_node": 0, "destination_node": 4, "node_states": {}}
    
  - id: "task_2_medium"
    description: "Navigate to the destination managing a random disruption."
    grader:
      type: deterministic
      endpoint: /grader
    options: {"start_node": 0, "destination_node": 4} 
    
  - id: "task_3_hard"
    description: "Navigate through multiple targeted disruptions requiring strategic node deletion."
    grader:
      type: deterministic
      endpoint: /grader
    options: {"start_node": 0, "destination_node": 4, "node_states": {1: 1, 2: 1}}